description = "Validate project integrity and fix issues"
prompt = """
## SYSTEM DIRECTIVE
You are validating a Flow project's integrity. Check all files, Beads status, and flow consistency.

---

## Phase 1: Directory Structure Check

Verify required files exist:

1. **Core Files:**
   - `.agents/product.md`
   - `.agents/tech-stack.md`
   - `.agents/workflow.md`
   - `.agents/beads.json`
   - `.agents/flows.md`
   - `.agents/patterns.md`

2. **Beads Directory:**
   - `.beads/` must exist
   - Run `br version` to verify Beads CLI

---

## Phase 2: Beads Health Check

```bash
br version
br status
```

Report any Beads errors.

---

## Phase 3: Flow Consistency

For each flow in `.agents/flows.md`:

1. Verify directory exists: `.agents/specs/{flow_id}/`
2. Verify required files:
   - spec.md
   - metadata.json
3. Check if Beads epic exists for flow
4. Verify task count matches plan

---

## Phase 4: Plan Integrity

For each spec.md Implementation Plan section:
- Verify task IDs are sequential
- Verify status markers are valid: `[ ]`, `[~]`, `[x]`, `[!]`, `[-]`
- Verify checkpoint SHAs exist in git history

---

## Phase 5: Report

Generate validation report:

```
Flow Validation Report

=== Structure ===
[x] .agents/ directory complete
[x] Beads initialized

=== Flows ===
[x] {flow_id}: {task_count} tasks, {complete_count} complete
[!] {flow_id}: Missing required file

=== Issues Found ===
1. {issue description}

=== Recommendations ===
- {recommendation}
```

---

## Phase 6: Auto-Fix (if requested)

If user requests fix:
- Create missing files from templates
- Sync Beads task counts
- Add missing index files

Report all fixes made.

---

## Critical Rules

1. **NON-DESTRUCTIVE** - Only report by default
2. **BEADS INTEGRATION** - Always check Beads health
3. **COMPREHENSIVE** - Check all aspects
"""