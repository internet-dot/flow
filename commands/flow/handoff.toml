description = "Create context handoff for session transfer"
prompt = """
## SYSTEM DIRECTIVE
You are creating a handoff document for transferring context between sessions. This ensures continuity when resuming work later.

**Input:** $ARGUMENTS (track_id)

---

## Phase 1: Analyze Progress

1. Read `.agent/specs/{track_id}/plan.md`
2. Calculate completion percentage
3. Identify current phase and task
4. Check for any blockers

---

## Phase 2: Gather Context

Collect:
1. Recent git history for this track:
   ```bash
   git log --notes --grep="track.*{track_id}" --oneline -10
   ```
2. Learnings from `learnings.md`
3. Any notes from Beads: `bd show {epic_id}`
4. Files modified in current phase

---

## Phase 3: Determine Handoff Number

Count existing handoff files:
```bash
ls .agent/specs/{track_id}/handoff_*.md 2>/dev/null | wc -l
```

New handoff number = count + 1

---

## Phase 4: Generate Handoff Document

Create `.agent/specs/{track_id}/handoff_{N}.md`:

```markdown
# Handoff: {track_id}

**Created:** {timestamp}
**Handoff Number:** {N}

## Current Status

**Phase:** {N} - {phase name}
**Task:** {current task number and description}
**Progress:** {completed}/{total} ({percentage}%)

## Context Summary

{Brief summary of what's been accomplished}

## Recent Commits

| SHA | Message | Files |
|-----|---------|-------|
| abc1234 | {message} | {count} files |

## Key Learnings

{Important patterns/gotchas discovered this session}

## Blockers

{Any current blockers, or "None"}

## Next Steps

1. {Immediate next task}
2. {Following tasks}
3. {Phase completion if close}

## Files to Review

{List of key files for context}

## Beads Recovery Commands

```bash
bd prime                    # Load AI-optimized context
bd ready                    # List unblocked tasks
bd show {epic_id}          # View track status
```

## Notes for Next Session

{Any additional context or warnings}
```

---

## Phase 5: Update State

Save to `.agent/specs/{track_id}/implement_state.json`:

```json
{
  "handoff_created": "{timestamp}",
  "handoff_number": {N},
  "current_phase": {phase},
  "current_task": {task}
}
```

---

## Phase 6: Commit Handoff

```bash
git add .agent/specs/{track_id}/
git commit -m "flow(handoff): {track_id} handoff {N}"
```

---

## Final Report

```
Handoff Created

Track: {track_id}
Handoff: handoff_{N}.md
Progress: {completed}/{total} tasks ({percentage}%)

To resume in new session:
1. Run `bd prime` to load Beads context
2. Read .agent/specs/{track_id}/handoff_{N}.md
3. Run `/flow:implement {track_id}` to continue
```

---

## Critical Rules

1. **COMPREHENSIVE** - Include all needed context
2. **BEADS COMMANDS** - Include recovery instructions
3. **COMMIT** - Preserve handoff in git
"""
