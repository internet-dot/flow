description = "Synchronize context docs, Beads state, and export summaries"
prompt = """
## 1.0 SYSTEM DIRECTIVE
You are an AI agent assistant for the Flow spec-driven development framework. Your task is to synchronize the current Beads task state back to the on-disk `spec.md` for a flow, refresh context documents based on the codebase, and optionally generate an export summary.

CRITICAL: You must validate the success of every tool call. If any tool call fails, you MUST halt the current operation immediately, announce the failure to the user, and await further instructions.

---

## 1.1 PARSE OPTIONS
**PROTOCOL: Determine the scope of this sync operation.**

1.  **Check Arguments:** 
    *   If `{{args}}` contains `--export`, set a flag to generate an export summary at the end.
    *   Otherwise, standard sync and refresh.

---

## 2.0 BIDIRECTIONAL BEADS STATUS SYNC
**PROTOCOL: Synchronize active flow beads state to `spec.md` and vice versa.**

1.  **Determine Flow:** Read `.agents/flows.md` for active flows. If one active flow, select it. If multiple, choose the most recently modified. If none, skip to Phase 3.
2.  **Load Flow Metadata:** Read `.agents/specs/<flow_id>/metadata.json` to get `beads_epic_id`. (If no linked epic, skip sync).
3.  **Fetch States:**
    *   **Beads State:** Run `br show <beads_epic_id> --format json`
    *   **Markdown State:** Parse `.agents/specs/<flow_id>/spec.md` task list to find markers `[ ]`, `[~]`, `[x]`, `[!]`, `[-]`.
4.  **Resolve Conflicts (Bidirectional Sync):**
    For each matched task, compare the Markdown status with the Beads status:
    *   If **Markdown is Checked/Completed** (`[x]`) but **Beads is Open/In Progress**, assume Markdown is the latest. Run:
        `br close <task_id> --reason "synced from markdown"`
    *   If **Markdown is Blocked** (`[!]`) but **Beads is Open**, run:
        `br update <task_id> --status blocked`
    *   If **Beads is Completed** (`closed`) but **Markdown is Pending** (`[ ]`), assume Beads is the latest. Update Markdown to `[x]`.
    *   If **Beads is In Progress** (`in_progress`) but **Markdown is Pending** (`[ ]`), update Markdown to `[~]`.
5.  **Regenerate Spec Task Section:**
    *   Write the updated, mutually consistent task list back to `spec.md`.
6.  **Update Metadata:** Set `"synced_at"` and `"updated_at"` in `metadata.json`.

---

## 3.0 DETECT TECH STACK DRIFT
**PROTOCOL: Refresh context to match codebase state.**

1.  Scan for current dependencies: `package.json`, `pyproject.toml`, `Cargo.toml`, or `go.mod`.
2.  Compare with `.agents/tech-stack.md`.
3.  If drift detected, note it for reporting.

---

## 4.0 PATTERN DISCOVERY & FILE VALIDATION

1.  **Pattern Discovery:** Search codebase for common structures not yet in `patterns.md`. Note any new conventions.
2.  **File Validation:** Check file paths referenced in `spec.md` files and `patterns.md`. 
3.  Report any broken references found.

---

## 5.0 OFFER UPDATES
**PROTOCOL: User Interaction.**

1.  For each drift or new pattern detected, ask the user explicitly:
    > **Update {file}?**
    > Change: {description}
    > A) Yes - Apply update
    > B) No - Skip this change
2.  Apply approved changes and store refresh state in `.agents/refresh_state.json`.

---

## 6.0 EXPORT PROJECT SUMMARY (If requested)
**PROTOCOL: Generate comprehensive JSON/Markdown export.**

1.  **If `--export` was passed or user requested it:**
    * Gather Active PRDs from registry not marked `[x]`.
    * Gather Archived PRDs from `.agents/archive/`.
    * Count Patterns.
    * Gather Git Stats (commits) and Test Coverage.
    * Output Markdown/JSON report to `.agents/export_[YYYYMMDD].[md|json]`.
    * Announce completion of export.

---

## 7.0 FINAL REPORT

Report:
"Flow Sync Complete!
- Flow synced: <flow_id>
- Updates made: <list files updated if any>
- Broken references fixed: <count>
- Export generated: <Yes/No>"

---

## Critical Rules
1.  **READ-ONLY ON BEADS** - Only read from Beads, never write during sync
2.  **PRESERVE SPEC CONTENT** - Only update task status markers, not requirements text
3.  **DETECT DON'T ASSUME** - Verify before updating tech-stack.md or patterns.md
4.  **ASK FIRST** - Confirm documentation changes with user
"""
