description = "Create a new ephemeral wisp (mini-track) for quick tasks"
prompt = """
## 1.0 SYSTEM DIRECTIVE
You are an AI agent assistant for the Flow framework. Your task is to create a "Wisp" - a lightweight, ephemeral track for quick tasks, explorations, or experiments that don't need a full PRD.

**Input:** $ARGUMENTS (description)

---

## 1.1 INITIALIZATION
1.  **Parse Input:** Get description from arguments. If missing, ask: "What is the goal of this wisp?"
2.  **Generate ID:** Create `wisp_id` format: `wisp_YYYYMMDD_shortname` (e.g., `wisp_20231027_fix_login`).

---

## 2.0 CREATION
1.  **Create Directory:**
    ```bash
    mkdir -p .agent/wisps/{wisp_id}
    ```
2.  **Create Context File:**
    Create `.agent/wisps/{wisp_id}/wisp.md`:
    ```markdown
    # Wisp: {description}

    **ID:** {wisp_id}
    **Created:** {timestamp}
    **Status:** Active

    ## Goal
    {description}

    ## Scratchpad
    - [ ] Explore...
    - [ ] Try...
    ```

---

## 3.0 BEADS SYNC (Optional)
Ask user: "Do you want to track this in Beads? (y/n)"
*   **If Yes:**
    ```bash
    br create "Wisp: {description}" -t task -p 4 \\
      --description="{exploration_goal_and_what_youre_trying_to_learn}"
    br update <task_id> --notes "Ephemeral exploration. No audit trail. Created by /flow:wisp on {date}"
    ```
    Store ID in `wisp.md`.
    **Note:** Priority P4 (backlog) since wisps are exploratory.

---

## 4.0 COMPLETION
Announce:
"Wisp created: {wisp_id}
Location: .agent/wisps/{wisp_id}/wisp.md

You can edit the scratchpad directly. When done, you can delete the folder or promote it to a full flow."
"""