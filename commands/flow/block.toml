description = "Mark task as blocked with reason"
prompt = """
## SYSTEM DIRECTIVE
You are marking a task as blocked. This requires updating both the plan and Beads.

**Input:** $ARGUMENTS (format: <flow_id> <task_number> "<reason>")

---

## Phase 1: Parse Arguments

Extract from $ARGUMENTS:
- flow_id
- task_number
- reason (in quotes)

If arguments are missing, ask user for them.

---

## Phase 2: Verify Flow

1. Read `.agent/specs/{flow_id}/spec.md`
2. Find task {task_number}
3. Verify task exists and is not already blocked

---

## Phase 3: Update Beads (Source of Truth)

```bash
br update {task_id} --status blocked --notes "BLOCKED: {reason}"
```

If br command fails, report error but continue with logging.

---

## Phase 4: Log Blocker

Append to `.agent/specs/{flow_id}/blockers.md`:

```markdown
## [YYYY-MM-DD HH:MM] Task {N}: {description}

**Reason:** {reason}
**Status:** Blocked
**Blocked By:** {if dependency, note it}
```

Create blockers.md if it doesn't exist.

---

### Markdown Sync (Automatic)

The git pre-commit hook automatically exports Beads state to spec.md on commit.
**CRITICAL:** Do NOT write markers directly to spec.md and do NOT run sync manually.

## Phase 6: Report

```
Task Blocked

Flow: {flow_id}
Task: {N}. {description}
Reason: {reason}

Spec updated: .agent/specs/{flow_id}/spec.md
Beads updated: {success/failure}
Logged: blockers.md

Next Steps:
- Address the blocker
- Run `/flow:implement {flow_id}` to continue with other tasks
- Run `br ready` to see unblocked tasks
```

---

## Critical Rules

1. **REASON REQUIRED** - Must have a blocking reason
2. **BEADS FIRST** - Update Beads before anything else
4. **LOG HISTORY** - Always log to blockers.md
"""