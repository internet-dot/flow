description = "Mark a task as blocked with reason"
prompt = """
## SYSTEM DIRECTIVE
You are marking a task as blocked. This requires updating both the plan and Beads.

**Input:** $ARGUMENTS (format: <flow_id> <task_number> "<reason>")

---

## Phase 1: Parse Arguments

Extract from $ARGUMENTS:
- flow_id
- task_number
- reason (in quotes)

If arguments are missing, ask user for them.

---

## Phase 2: Verify Flow

1. Read `.agent/specs/{flow_id}/plan.md`
2. Find task {task_number}
3. Verify task exists and is not already blocked

---

## Phase 3: Update Plan

Change task status in plan.md:

From: `- [ ] N. Task description` or `- [~] N. Task description`
To: `- [!] N. Task description [BLOCKED: {reason}]`

---

## Phase 4: Update Beads

```bash
bd block {task_id} --reason "{reason}"
```

If bd command fails, report error but continue with plan update.

---

## Phase 5: Log Blocker

Append to `.agent/specs/{flow_id}/blockers.md`:

```markdown
## [YYYY-MM-DD HH:MM] Task {N}: {description}

**Reason:** {reason}
**Status:** Blocked
**Blocked By:** {if dependency, note it}
```

Create blockers.md if it doesn't exist.

---

## Phase 6: Report

```
Task Blocked

Flow: {flow_id}
Task: {N}. {description}
Reason: {reason}

Plan updated: .agent/specs/{flow_id}/plan.md
Beads updated: {success/failure}
Logged: blockers.md

Next Steps:
- Address the blocker
- Run `/flow:implement {flow_id}` to continue with other tasks
- Run `bd ready` to see unblocked tasks
```

---

## Critical Rules

1. **REASON REQUIRED** - Must have a blocking reason
2. **BEADS SYNC** - Always attempt Beads update
3. **LOG HISTORY** - Always log to blockers.md
"""