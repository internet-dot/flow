description = "List and manage flow templates"
prompt = """
## SYSTEM DIRECTIVE
You are managing Beads flow templates (formulas). Handle list, pour, and distill operations.

**Input:** $ARGUMENTS (action: list|pour|distill, and optional template_name or flow_id)

---

## Phase 1: Parse Command

Determine action from $ARGUMENTS:
- `list` - Show available templates
- `pour {template}` - Create flow from template
- `distill {flow_id} {name}` - Extract template from flow

If no arguments, default to `list`.

---

## Action: LIST

### Phase 2a: List Local Templates

```bash
ls .agent/templates/*.md 2>/dev/null
```

### Phase 3a: Parse Template Details

For each template file found, read the file header to extract:
- Template name (from `# Template:` line)
- Description (from `**Description:**` line)
- Source flow (from `**Source:**` line)
- Placeholder count

### Phase 4a: Display

```
Available Templates (.agent/templates/)

api-endpoint.md - REST API endpoint template
frontend-component.md - React/Vue component template
feature-crud.md - Standard CRUD feature template
```

---

## Action: POUR

### Phase 2b: Read Template

1. Read `.agent/templates/{template_name}.md`
2. Parse placeholders from the `## Placeholders` table
3. If template not found, list available templates and ask user to select

### Phase 3b: Customize

1. For each placeholder, ask user for value
2. Ask for flow description
3. Generate flow_id with date suffix
4. Replace template placeholders with user values
5. Create Beads epic and tasks
6. Register in flows.md

### Phase 4b: Report

```
Flow Created from Template

Template: {template_name}
Flow ID: {flow_id}
Tasks: {count}
Beads Epic: {epic_id}

Next: Run `/flow:implement {flow_id}` to start
```

---

## Action: DISTILL

### Phase 2c: Read Flow

1. Verify flow exists: `.agent/specs/{flow_id}/` or `.agent/archive/{flow_id}/`
2. Read spec.md, learnings.md

### Phase 3c: Abstract

Ask user about each element:
> Template this? "{task_description}"
> A) Yes - Use placeholder: {{feature_name}}
> B) No - Keep specific

### Phase 4c: Generate Template

Create `.agent/templates/{name}.md`:

```markdown
# Template: {name}

**Source:** {flow_id}
**Created:** {date}

## When to Use
{guidance}

## Placeholders
| Placeholder | Description |
|-------------|-------------|
| {{feature_name}} | Name of feature |

## Spec Template
{abstracted spec}

## Plan Template
{abstracted plan with placeholders}

## Learnings
{relevant learnings from source}
```

### Phase 5c: Report

```
Template Extracted

Name: {name}
Source: {flow_id}
Location: .agent/templates/{name}.md

To use: /flow:formula pour {name}
```

---

## Critical Rules

1. **FILE-BASED TEMPLATES** - Templates stored in `.agent/templates/` as markdown files
2. **PLACEHOLDER CLARITY** - Use descriptive placeholders
3. **PRESERVE LEARNINGS** - Include gotchas in templates
"""