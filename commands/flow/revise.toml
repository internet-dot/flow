description = "Update spec or plan when implementation reveals issues"
prompt = """
## SYSTEM DIRECTIVE
You are revising a track's spec or plan because implementation has revealed new information. All revisions must be documented.

**Input:** $ARGUMENTS (track_id)

---

## Phase 1: Load Current State

Read from `.agent/specs/{track_id}/`:
- spec.md
- plan.md
- learnings.md

---

## Phase 2: Identify Revision Type

Ask user:

> **What needs to be revised?**
>
> A) Spec - Requirements have changed
> B) Plan - Tasks need adjustment
> C) Both - Significant pivot needed

---

## Phase 3: Document Reason

Ask user:

> **Why is this revision needed?**
> (This will be logged for future reference)

---

## Phase 4: Make Revisions

Based on revision type:

### Spec Revision

1. Show current spec sections
2. Ask which sections need changes
3. For each section:
   - Show current content
   - Ask for new content
   - Validate acceptance criteria are still testable

### Plan Revision

1. Show current task list with status
2. Allow:
   - Add new tasks
   - Remove tasks (if not started)
   - Reorder tasks
   - Update task descriptions
   - Update dependencies

3. Recalculate task numbers if needed

---

## Phase 5: Log Revision

Append to `.agent/specs/{track_id}/revisions.md`:

```markdown
## [YYYY-MM-DD HH:MM] Revision {N}

**Type:** {spec|plan|both}
**Reason:** {user provided reason}

### Changes Made

**Spec Changes:**
- {description of spec change}

**Plan Changes:**
- Added: Task {N} - {description}
- Removed: Task {M} - {description}
- Modified: Task {K} - {old} -> {new}

### Impact Assessment

- Tasks affected: {list}
- Timeline impact: {estimate if any}
- Dependencies updated: {list}
```

Create revisions.md if it doesn't exist.

---

## Phase 6: Sync Beads

If plan changed:
```bash
bd update {affected_task_ids} --notes "Revised: {brief reason}"
```

For new tasks:
```bash
bd create "{task}" -e {epic_id}
```

For removed tasks:
```bash
bd close {task_id} --note "Removed in revision"
```

---

## Phase 7: Commit Revision

```bash
git add .agent/specs/{track_id}/
git commit -m "flow(revise): {track_id} - {brief description}"
```

---

## Final Summary

```
Track Revised

Track: {track_id}
Revision: #{N}

Changes:
- Spec: {summary or "No changes"}
- Plan: {tasks added/removed/modified}

Beads synced: {yes/no}
Committed: {sha}

Logged in: revisions.md
```

---

## Critical Rules

1. **DOCUMENT EVERYTHING** - Log all revisions with reasons
2. **BEADS SYNC** - Update all affected tasks
3. **PRESERVE HISTORY** - Never delete, only append to revisions.md
4. **VALIDATE** - Ensure acceptance criteria remain testable
"""
