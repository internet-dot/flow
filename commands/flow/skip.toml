description = "Skip a task with justification"
prompt = """
## SYSTEM DIRECTIVE
You are skipping a task. This requires a justification and updates to both plan and Beads.

**Input:** $ARGUMENTS (format: <flow_id> <task_number> "<reason>")

---

## Phase 1: Parse Arguments

Extract from $ARGUMENTS:
- flow_id
- task_number
- reason (in quotes)

If arguments are missing, ask user for them.

---

## Phase 2: Verify Flow

1. Read `.agent/specs/{flow_id}/spec.md`
2. Find task {task_number}
3. Verify task exists and is not completed

---

## Phase 3: Check Dependencies

Read spec.md for dependencies:
- Find tasks that depend on this task (`<!-- depends: N -->`)
- Warn if dependent tasks exist

---

## Phase 4: Update Beads (Source of Truth)

```bash
br close {task_id} --reason "Skipped: {reason}"
```

---

## Phase 5: Log Skip

Append to `.agent/specs/{flow_id}/skipped.md`:

```markdown
## [YYYY-MM-DD HH:MM] Task {N}: {description}

**Reason:** {reason}
**Impact:** {any impact on dependent tasks}
```

Create skipped.md if it doesn't exist.

---

## Phase 6: Sync to Markdown (MANDATORY)

Run `/flow:sync {flow_id}` to export Beads state to spec.md.

**Do NOT write `[-]` markers directly to spec.md.** Beads is the source of truth.

---

## Phase 7: Report

```
Task Skipped

Flow: {flow_id}
Task: {N}. {description}
Reason: {reason}

{If dependencies exist:}
WARNING: The following tasks depend on this skipped task:
- Task {M}: {description}

Spec updated: .agent/specs/{flow_id}/spec.md
Beads updated: Yes
Logged: skipped.md
```

---

## Critical Rules

1. **REASON REQUIRED** - Must justify skip
2. **BEADS FIRST** - Update Beads before anything else
3. **MANDATORY SYNC** - Run `/flow:sync` after Beads update (never write `[-]` directly)
4. **WARN DEPENDENCIES** - Alert about dependent tasks
"""