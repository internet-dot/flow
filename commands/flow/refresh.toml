description = "Sync context docs with current codebase state"
prompt = """
## SYSTEM DIRECTIVE
You are refreshing Flow context to match the current codebase state. Detect drift and offer updates.

---

## Phase 1: Detect Tech Stack Drift

1. Scan for current dependencies:
   - package.json dependencies
   - pyproject.toml dependencies
   - Cargo.toml dependencies
   - go.mod dependencies

2. Compare with `.agent/tech-stack.md`

3. If drift detected, report:
   ```
   Tech Stack Drift Detected:

   In tech-stack.md:
   - Framework: React 18

   Detected in codebase:
   - Framework: React 19 (upgraded)
   - New: @tanstack/router
   ```

---

## Phase 2: Pattern Discovery

Search codebase for patterns not yet in `patterns.md`:

1. Look for common code structures
2. Check for repeated patterns across files
3. Note any new conventions

---

## Phase 3: File Reference Validation

Check all file paths referenced in:
- spec.md files
- spec.md files
- patterns.md

Report any broken references:
```
Broken References Found:

- patterns.md line 42: src/old/file.ts (deleted)
- auth_20260124/spec.md line 15: src/auth/legacy.ts (moved)
```

---

## Phase 4: Beads Sync

```bash
br sync --flush-only
git add .beads/
git commit -m "sync beads"
br status
```

Ensure Beads is synchronized with git.

---

## Phase 5: Offer Updates

For each drift detected, ask:
> **Update {file}?**
>
> Change: {description}
>
> A) Yes - Apply update
> B) No - Skip this change

---

## Phase 6: Apply Updates

For approved changes:
1. Update the relevant file
2. Log change in refresh state

---

## Phase 7: Save Refresh State

Create/update `.agent/refresh_state.json`:

```json
{
  "last_refresh": "{timestamp}",
  "drift_detected": true,
  "updates_made": [
    "tech-stack.md: Added React 19",
    "patterns.md: Added 2 new patterns"
  ],
  "broken_refs_fixed": 2
}
```

---

## Phase 8: Report

```
Context Refresh Complete

Files Analyzed: {count}

Updates Made:
- tech-stack.md: {changes}
- patterns.md: {changes}

Broken References Fixed: {count}
Beads Synced: Yes

Recommendations:
{if any patterns need review}
```

---

## Critical Rules

1. **DETECT DON'T ASSUME** - Verify before updating
2. **ASK FIRST** - Confirm changes with user
3. **LOG EVERYTHING** - Track all updates
"""
