## 3.0 INITIAL PLAN AND PRD GENERATION
**PROTOCOL: Interactively define project requirements, propose a single PRD, and then automatically create the corresponding PRD and its phased plan.**

### 3.1 Generate Product Requirements (Interactive)(For greenfield projects only)
1.  **Transition to Requirements:** Announce that the initial project setup is complete. State that you will now begin defining the high-level product requirements by asking about topics like user stories and functional/non-functional requirements.
2.  **Analyze Context:** Read and analyze the content of `<root_directory>/product.md` to understand the project's core concept.
3.  **Ask Questions Sequentially:** Ask one question at a time. Wait for and process the user's response before asking the next question. Continue this interactive process until you have gathered enough information.
    -   **CONSTRAINT** Limit your inquiries to a maximum of 5 questions.
    -   **SUGGESTIONS:** For each question, generate 3 high-quality suggested answers based on common patterns or context you already have.
    *   **General Guidelines:**
        *   **1. Classify Question Type:** Before formulating any question, you MUST first classify its purpose as either "Additive" or "Exclusive Choice".
            *   Use **Additive** for brainstorming and defining scope (e.g., users, goals, features, project guidelines). These questions allow for multiple answers.
            *   Use **Exclusive Choice** for foundational, singular commitments (e.g., selecting a primary technology, a specific workflow rule). These questions require a single answer.

        *   **2. Formulate the Question:** Based on the classification, you MUST adhere to the following:
            *   **If Additive:** Formulate an open-ended question that encourages multiple points. You MUST then present a list of options and add the exact phrase "(Select all that apply)" directly after the question.
            *   **If Exclusive Choice:** Formulate a direct question that guides the user to a single, clear decision. You MUST NOT add "(Select all that apply)".

        *   **3. Interaction Flow:**
                *   **CRITICAL:** You MUST ask questions sequentially (one by one). Do not ask multiple questions in a single turn. Wait for the user's response after each question.
            *   The last two options for every multiple-choice question MUST be "Type your own answer" and "Auto-generate the rest of requirements and move to the next step".
            *   Confirm your understanding by summarizing before moving on.
        - **Format:** You MUST present these as a vertical list, with each option on its own line.
        - **Structure:**
            A) [Option A]
            B) [Option B]
            C) [Option C]
            D) [Type your own answer]
            E) [Auto-generate the rest of requirements and move to the next step]
    -   **AUTO-GENERATE LOGIC:** If the user selects option E, immediately stop asking questions for this section. Use your best judgment to infer the remaining details based on previous answers and project context.
-   **CRITICAL:** When processing user responses or auto-generating content, the source of truth for generation is **only the user's selected answer(s)**. You MUST completely ignore the questions you asked and any of the unselected `A/B/C` options you presented. This gathered information will be used in subsequent steps to generate relevant documents. DO NOT include the conversational options (A, B, C, D, E) in the gathered information.
4.  **Continue:** After gathering enough information, immediately proceed to the next section.

### 3.2 Propose a Single Initial PRD (Automated + Approval)
1.  **State Your Goal:** Announce that you will now propose an initial PRD to get the project started. Briefly explain that a "PRD" (Product Requirements Document) is a high-level unit of work (like a feature or bug fix) used to organize the project.
2.  **Generate PRD Title:** Analyze the project context (`product.md`, `tech-stack.md`) and (for greenfield projects) the requirements gathered in the previous step. Generate a single PRD title that summarizes the entire initial PRD. For existing projects (brownfield): Recommend a plan focused on maintenance and targeted enhancements that reflect the project's current state.
    - Greenfield project example (usually MVP):
        ```markdown
        To create the MVP of this project, I suggest the following PRD:
        - Build the core functionality for the tip calculator with a basic calculator and built-in tip percentages.
        ```
    - Brownfield project example:
        ```markdown
        To create the first PRD of this project, I suggest the following PRD:
        - Create user authentication flow for user sign in.
        ```
3.  **User Confirmation:** Present the generated PRD title to the user for review and approval. If the user declines, ask the user for clarification on what PRD to start with.

### 3.3 Convert the Initial PRD into Artifacts (Automated)
1.  **State Your Goal:** Once the PRD is approved, announce that you will now create the artifacts for this initial PRD.
2.  **Initialize Flow Registry File:** Create the `<root_directory>/flows.md` file with the initial header and the first PRD:
    ```markdown
    # Flow Registry

    This file tracks all PRDs (Product Requirements Documents) for the project. Each PRD has its own detailed plan in its respective folder.

    ---

    ## [ ] Flow: <PRD Description>
    *Link: [./specs/<flow_id>/](./specs/<flow_id>/)*
    ```
3.  **Generate PRD Artifacts:**
    a. **Define PRD:** The approved title is the PRD description.
    b. **Generate PRD-Specific Spec & Plan:**
        i. Automatically generate a detailed `spec.md` for this PRD.
        ii. Automatically generate a `plan.md` for this PRD.
            - **CRITICAL:** The structure of the tasks must adhere to the principles outlined in the workflow file at `<root_directory>/workflow.md`. For example, if the workflow specifies Test-Driven Development, each feature task must be broken down into a "Write Tests" sub-task followed by an "Implement Feature" sub-task.
            - **CRITICAL:** Include status markers `[ ]` for **EVERY** task and sub-task. The format must be:
                - Parent Task: `- [ ] Task: ...`
                - Sub-task: `    - [ ] ...`
            - **CRITICAL: Inject Phase Completion Tasks.** You MUST read the `<root_directory>/workflow.md` file to determine if a "Phase Completion Verification and Checkpointing Protocol" is defined. If this protocol exists, then for each **Phase** that you generate in `plan.md`, you MUST append a final meta-task to that phase. The format for this meta-task is: `- [ ] Task: Flow - User Manual Verification '<Phase Name>' (Protocol in workflow.md)`. You MUST replace `<Phase Name>` with the actual name of the phase.
    c. **Create PRD Artifacts:**
        i. **Generate and Store Flow ID:** Create a unique Flow ID from the PRD description using a simple slug format:
            - Convert to lowercase
            - Replace spaces with hyphens
            - Remove special characters
            - Example: "Add User Authentication" -> `user-auth`
            You MUST use this exact same ID for all subsequent steps for this PRD.
        ii. **Create Single Directory:** Resolve the **Flow Directory** via the **Universal File Resolution Protocol** (which defaults to `<root_directory>/specs/`) and create a single new directory: `<root_directory>/specs/<flow_id>/`.
        iii. **Create `metadata.json`:** In the new directory, create a `metadata.json` file with the correct structure and content, using the stored Flow ID. An example is:
            - ```json
            {
            "flow_id": "<flow_id>",
            "type": "feature", // or "bug"
            "status": "new", // or in_progress, completed, cancelled
            "created_at": "YYYY-MM-DDTHH:MM:SSZ",
            "updated_at": "YYYY-MM-DDTHH:MM:SSZ",
            "description": "<Initial user description>"
            }
            ```
        Populate fields with actual values. Use the current timestamp.
        iv. **Write Spec and Plan Files:** In the exact same directory, write the generated `spec.md` and `plan.md` files.
        v.  **Write Index File:** In the exact same directory, write `index.md` with content:
            ```markdown
            # Flow <flow_id> Context

            - [Specification](./spec.md)
            - [Implementation Plan](./plan.md)
            - [Metadata](./metadata.json)
            ```

    d. **Commit State:** After all PRD artifacts have been successfully written, you MUST immediately write to `<root_directory>/setup-state.json` with the exact content:
       `{"last_successful_step": "3.3_initial_prd_generated", "root_directory": "<root_directory>"}`

    e. **Announce Progress:** Announce that the PRD for "<PRD Description>" has been created.

### 3.4 Final Announcement
1.  **Announce Completion:** After the PRD has been created, announce that the project setup and initial PRD generation are complete.

2.  **Configure Gemini Ignore (IMPORTANT):**
    -   Create `.geminiignore` file with the following content to ensure Gemini can access Flow files:
        ```
        # Allow Gemini to access Flow specification files
        !.agent/
        ```
    -   Check if `.gitignore` exists and does not already contain `.geminiignore`.
    -   **If `.gitignore` exists and needs update:**
        -   Ask user: "Add `.geminiignore` to `.gitignore`? (Recommended)"
            -   **A) Yes**
            -   **B) No**
        -   If A: Append `.geminiignore` to `.gitignore`.
    -   **If `.gitignore` does not exist:** Do nothing regarding gitignore.
    -   This ensures Flow files are accessible to Gemini while respecting the user's git preferences.

3.  **Save Flow Files (Respect Gitignore):**
    -   **CRITICAL:** NEVER use `git add -f` to force-add gitignored files.
    -   Check if `.agent/` is listed in `.gitignore`.
    -   **If `.agent/` IS gitignored:**
        -   Announce: "Flow setup complete. Note: `.agent/` is gitignored, so Flow files will not be committed. This is often intentional for keeping specs local."
        -   Do NOT attempt to commit Flow specification files.
    -   **If `.agent/` is NOT gitignored:**
        -   Ask the user: "Would you like to commit the Flow setup files?"
            -   A) Yes, commit them
            -   B) No, I'll handle commits myself
        -   If user chooses A: Add and commit with message `flow(setup): Add Flow setup files`.
        -   If user chooses B: Skip committing and proceed.

4.  **Next Steps:** Inform the user that they can now begin work by running `/flow:implement`.
"""